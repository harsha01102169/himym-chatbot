<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>HIMYM — The Gang</title>






  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }















    /* ── TOP NAV (mobile character selector) ── */
    #top-nav {
      display: none;
      background: #0f0f18;
      border-bottom: 1px solid #1e1e2e;
      padding: 10px 12px;
      gap: 8px;
      overflow-x: auto;



























































































      flex-shrink: 0;
      scrollbar-width: none;
    }
    #top-nav::-webkit-scrollbar { display: none; }

    .nav-btn {














































      display: flex;
      flex-direction: column;






































      align-items: center;













      gap: 4px;
      padding: 6px 10px;
      border-radius: 10px;



































































































      border: none;
      background: transparent;




















      cursor: pointer;

      flex-shrink: 0;
      min-width: 56px;














    }
    .nav-btn.active { background: #1a1a28; }
    .nav-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; }
    .nav-name { font-size: 10px; color: #888; white-space: nowrap; }
    .nav-btn.active .nav-name { color: #e0e0e0; }

    /* ── DESKTOP LAYOUT ── */
    #layout { display: flex; flex: 1; min-height: 0; }





    #sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #0f0f18;
      border-right: 1px solid #1e1e2e;
      display: flex;
      flex-direction: column;
      padding: 16px 0;
















    }
    #sidebar h2 { font-size: 11px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 12px; }

    .char-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; border: none;
      background: transparent; width: 100%; text-align: left;
      transition: background 0.15s; border-left: 3px solid transparent;







    }
    .char-btn:hover { background: #1a1a28; }
    .char-btn.active { background: #1a1a28; border-left-color: var(--char-color); }
    .char-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; color: #fff; }
    .char-info { flex: 1; min-width: 0; }
    .char-name { font-size: 13px; font-weight: 500; color: #e0e0e0; }
    .char-role { font-size: 11px; color: #555; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── MAIN CHAT ── */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }








    #chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid #1e1e2e;
      background: #0f0f18; flex-shrink: 0;






















    }
    #header-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
    #header-name { font-size: 14px; font-weight: 500; }
    #header-status { font-size: 11px; color: #555; margin-top: 1px; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B6D11; margin-left: auto; flex-shrink: 0; }

    #chat-window {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      min-height: 0;
















    }
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

    .msg-row { display: flex; gap: 8px; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .bubble { padding: 10px 13px; font-size: 14px; line-height: 1.6; max-width: 78%; border-radius: 4px 14px 14px 14px; background: #1e1e2e; color: #e0e0e0; word-break: break-word; }
    .bubble.user { background: #185FA5; border-radius: 14px 4px 14px 14px; color: #fff; }
    .char-label { font-size: 11px; color: #444; margin-bottom: 2px; padding-left: 36px; }








    #typing { display: none; align-items: center; gap: 8px; padding: 0 16px 8px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; display: inline-block; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }














    #input-area {
      padding: 10px 12px 12px; border-top: 1px solid #1e1e2e;
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;




    }
    #user-input {
      flex: 1; resize: none; font-size: 14px; padding: 10px 12px;
      border-radius: 20px; border: 1px solid #2a2a3a;
      background: #0f0f18; color: #f0f0f0; font-family: inherit;
      line-height: 1.5; outline: none; max-height: 120px;
    }
    #user-input:focus { border-color: #2a2a4a; }
    #user-input::placeholder { color: #444; }
    #send-btn {
      width: 44px; height: 44px; border-radius: 50%; font-size: 18px;
      cursor: pointer; border: none; color: #fff; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;








    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      #sidebar { display: none; }
      #top-nav { display: flex; }
      .bubble { max-width: 88%; font-size: 13px; }
      #chat-header { padding: 10px 12px; }
      #chat-window { padding: 12px; }





















    }
  </style>
</head>
