<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>HIMYM — The Gang</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ── DESIGN SYSTEM & CONSTANTS ── */
    :root {
      --bg-dark: #07070b;
      --panel-dark: rgba(13, 13, 23, 0.75);
      --border-light: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      
      /* Active Accent Variables (driven dynamically by JS) */
      --accent-color: #185FA5;
      --accent-gradient: linear-gradient(135deg, #185FA5 0%, #0d3b66 100%);
      --accent-glow: rgba(24, 95, 165, 0.45);
      --accent-bg-glow: rgba(24, 95, 165, 0.16);
      --accent-bg-glow-sec: rgba(13, 59, 102, 0.08);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body { 
      background: var(--bg-dark); 
      color: var(--text-main); 
      height: 100dvh; 
      display: flex; 
      justify-content: center;
      align-items: center;
      overflow: hidden; 
      position: relative;
    }

    /* ── DYNAMIC BACKGROUND GLOWS ── */
    .bg-glow-container {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-glow {
      position: absolute;
      width: 45vw;
      height: 45vw;
      border-radius: 50%;
      filter: blur(160px);
      transition: background 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0.16;
    }
    
    @keyframes float-glow-1 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(6vw, 4vh) scale(1.15); }
      100% { transform: translate(0, 0) scale(1); }
    }
    @keyframes float-glow-2 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-5vw, -6vh) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }
    .bg-glow-1 {
      top: -15%;
      left: -15%;
      background: var(--accent-bg-glow);
      animation: float-glow-1 25s infinite ease-in-out;
    }
    .bg-glow-2 {
      bottom: -15%;
      right: -15%;
      background: var(--accent-bg-glow-sec);
      animation: float-glow-2 30s infinite ease-in-out;
    }

    /* ── BASE CONTAINER ── */
    #app-container {
      display: flex;
      width: 95vw;
      height: 90vh;
      max-width: 900px;
      max-height: 800px;
      background: var(--panel-dark);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-light);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      z-index: 10;
      transition: all 0.3s ease;
    }

    #chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100%;
      background: rgba(7, 7, 12, 0.2);
    }

    /* ── CHAT HEADER ── */
    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-light);
      background: rgba(10, 10, 18, 0.3);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    #header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      transition: all 0.5s ease;
      box-shadow: 0 4px 12px var(--accent-bg-glow);
    }
    .header-meta {
      min-width: 0;
    }
    #header-name {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
    }
    #header-status {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
    }

    /* ── CHAT SCREEN ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }
    #chat-window::-webkit-scrollbar { width: 6px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 10px; }
    #chat-window::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }

    /* Messages & Transitions */
    .msg-row {
      display: flex;
      gap: 12px;
      max-width: 80%;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(16px);
      animation: messageIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
    }
    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-row.char {
      align-self: flex-start;
    }

    @keyframes messageIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      margin-top: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .bubble-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .char-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      padding-left: 4px;
    }
    .msg-row.user .char-label {
      align-self: flex-end;
      padding-right: 4px;
      padding-left: 0;
    }

    .bubble {
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 18px;
      word-break: break-word;
      transition: all 0.3s ease;
    }

    .msg-row.char .bubble {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-light);
      color: var(--text-main);
      border-top-left-radius: 4px;
    }
    
    .msg-row.user .bubble {
      background: var(--accent-gradient);
      color: #fff;
      border-top-right-radius: 4px;
      box-shadow: 0 4px 15px var(--accent-bg-glow);
    }

    /* ── TYPING INDICATOR ── */
    #typing {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 0 24px 16px;
      align-self: flex-start;
    }
    .typing-bubble {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-light);
      padding: 12px 18px;
      border-radius: 18px;
      border-top-left-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-color);
      display: inline-block;
      opacity: 0.4;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    .dot:nth-child(3) { animation-delay: 0s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.3); opacity: 0.4; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 16px 24px 24px;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 8px 12px 8px 12px;
      transition: all 0.3s ease;
      position: relative;
    }
    .input-wrapper:focus-within {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent-color);
      box-shadow: 0 0 15px rgba(var(--accent-color), 0.15);
    }

    #user-input {
      flex: 1;
      resize: none;
      font-size: 14px;
      border: none;
      background: transparent;
      color: var(--text-main);
      outline: none;
      max-height: 120px;
      padding: 10px 0;
      line-height: 1.5;
    }
    #user-input::placeholder {
      color: var(--text-dim);
    }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent-gradient);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      box-shadow: 0 4px 10px var(--accent-bg-glow);
      font-size: 16px;
      line-height: 1;
    }
    #send-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 15px var(--accent-glow);
    }
    #send-btn:active:not(:disabled) {
      transform: scale(0.92);
    }
    #send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── GEMINI-STYLE DROPDOWN SELECTOR ── */
    .char-dropdown-container {
      position: relative;
      align-self: center;
      margin-bottom: 2px;
    }

    #char-dropdown-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 16px;
      border: 1px solid var(--border-light);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      outline: none;
    }
    #char-dropdown-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-color);
      box-shadow: 0 0 12px var(--accent-bg-glow);
    }

    #dropdown-btn-avatar {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      transition: all 0.3s ease;
    }

    #char-dropdown-btn .chevron-icon {
      width: 14px;
      height: 14px;
      fill: var(--text-muted);
      transition: transform 0.25s ease;
    }
    #char-dropdown-btn.open .chevron-icon {
      transform: rotate(180deg);
    }

    .char-dropdown-menu {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 0;
      width: 280px;
      background: rgba(13, 13, 23, 0.95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 8px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-bg-glow);
      z-index: 100;
      display: none;
      flex-direction: column;
      gap: 4px;
      transform: scale(0.95) translateY(8px);
      opacity: 0;
      pointer-events: none;
      transform-origin: bottom left;
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
    }
    .char-dropdown-menu.show {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .dropdown-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.02);
    }
    .dropdown-item.active {
      background: var(--accent-bg-glow-sec);
      border-color: var(--border-light);
    }

    .dropdown-avatar {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .dropdown-info {
      flex: 1;
      min-width: 0;
    }
    .dropdown-name {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }
    .dropdown-status {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dropdown-check {
      width: 16px;
      height: 16px;
      fill: var(--accent-color);
      opacity: 0;
      transition: opacity 0.2s ease;
      margin-left: auto;
    }
    .dropdown-item.active .dropdown-check {
      opacity: 1;
    }

    /* ── RESPONSIVE STYLES ── */
    @media (max-width: 768px) {
      #app-container {
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        border-radius: 0;
        border: none;
      }
      .msg-row { max-width: 90%; }
      #chat-header { padding: 12px 16px; }
      #chat-window { padding: 16px; }
      #input-area { padding: 12px 16px 16px; }
    }

    @media (max-width: 480px) {
      #dropdown-btn-name {
        display: none;
      }
      #char-dropdown-btn {
        padding: 6px 8px;
      }
      .char-dropdown-menu {
        width: 250px;
      }
      #header-status {
        display: none;
      }
      #header-name {
        font-size: 14px;
      }
      .header-left {
        gap: 8px;
      }
      #header-avatar {
        width: 36px;
        height: 36px;
        font-size: 13px;
        border-radius: 10px;
      }
      #chat-header {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Background Orbs -->
  <div class="bg-glow-container">
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
  </div>

  <div id="app-container">
    <!-- Main Chat Pane -->
    <div id="chat-main">
      
      <!-- Header -->
      <div id="chat-header">
        <div class="header-left">
          <div id="header-avatar">BS</div>
          <div class="header-meta">
            <div id="header-name">Barney Stinson</div>
            <div id="header-status">Suits. Schemes. Legendary.</div>
          </div>
        </div>
        <div class="online-dot"></div>
      </div>

      <!-- Messages Window -->
      <div id="chat-window">
        <!-- Message bubbles populated here -->
      </div>

      <!-- Typing Indicator -->
      <div id="typing">
        <div class="msg-avatar" id="typing-avatar">BS</div>
        <div class="typing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <!-- Input Area -->
      <div id="input-area">
        <div class="input-wrapper">
          <!-- Gemini-style Character Dropdown Selector -->
          <div class="char-dropdown-container">
            <button id="char-dropdown-btn" onclick="toggleCharDropdown(event)" title="Choose Character">
              <div id="dropdown-btn-avatar">BS</div>
              <span id="dropdown-btn-name">Barney</span>
              <svg class="chevron-icon" viewBox="0 0 24 24">
                <path d="M7 10l5 5 5-5z"/>
              </svg>
            </button>
            <div id="char-dropdown-menu" class="char-dropdown-menu">
              <!-- Populated dynamically via JS -->
            </div>
          </div>
          
          <textarea id="user-input" rows="1" placeholder="Message Barney..."></textarea>
          <button id="send-btn" onclick="sendMessage()">↑</button>
        </div>
      </div>

    </div>
  </div>

<script>
const BACKEND = 'https://barney-backend-dxhq.onrender.com';

const CHARS = {
  barney: { 
    name: 'Barney Stinson', 
    initials: 'BS', 
    color: '#185FA5', 
    gradient: 'linear-gradient(135deg, #185FA5 0%, #0d3b66 100%)',
    glow: 'rgba(24, 95, 165, 0.4)',
    bgGlow1: 'rgba(24, 95, 165, 0.16)',
    bgGlow2: 'rgba(13, 59, 102, 0.08)',
    status: 'Suits. Schemes. Legendary.', 
    placeholder: 'Message Barney...'
  },
  ted: { 
    name: 'Ted Mosby', 
    initials: 'TM', 
    color: '#8B4513', 
    gradient: 'linear-gradient(135deg, #8B4513 0%, #5c2d0c 100%)',
    glow: 'rgba(139, 69, 19, 0.4)',
    bgGlow1: 'rgba(139, 69, 19, 0.16)',
    bgGlow2: 'rgba(92, 45, 12, 0.08)',
    status: 'Architect. Hopeless romantic.', 
    placeholder: 'Message Ted...'
  },
  robin: { 
    name: 'Robin Scherbatsky', 
    initials: 'RS', 
    color: '#8B0000', 
    gradient: 'linear-gradient(135deg, #8B0000 0%, #5a0000 100%)',
    glow: 'rgba(139, 0, 0, 0.4)',
    bgGlow1: 'rgba(139, 0, 0, 0.16)',
    bgGlow2: 'rgba(90, 0, 0, 0.08)',
    status: 'Journalist. Canadian.', 
    placeholder: 'Message Robin...'
  },
  lily: { 
    name: 'Lily Aldrin', 
    initials: 'LA', 
    color: '#8B6914', 
    gradient: 'linear-gradient(135deg, #8B6914 0%, #5c450c 100%)',
    glow: 'rgba(139, 105, 20, 0.4)',
    bgGlow1: 'rgba(139, 105, 20, 0.16)',
    bgGlow2: 'rgba(92, 69, 12, 0.08)',
    status: 'Teacher. Secret mastermind.', 
    placeholder: 'Message Lily...'
  },
  marshall: { 
    name: 'Marshall Eriksen', 
    initials: 'ME', 
    color: '#2E6B2E', 
    gradient: 'linear-gradient(135deg, #2E6B2E 0%, #1c421c 100%)',
    glow: 'rgba(46, 107, 46, 0.4)',
    bgGlow1: 'rgba(46, 107, 46, 0.16)',
    bgGlow2: 'rgba(28, 66, 28, 0.08)',
    status: 'Lawyer. True optimist.', 
    placeholder: 'Message Marshall...'
  },
};

const GREETINGS = {
  barney:   "Suit up. You've reached Barney Stinson — lawyer, legend, and the best wingman you'll ever have. Ask me anything. This is going to be legen — wait for it — dary!",
  ted:      "Oh hey! Ted Mosby here — architect, professor, and someone who believes everything happens for a reason. What's on your mind? I promise I'll only tell one long story.",
  robin:    "Robin Scherbatsky. I have about five minutes between segments, so make it count. What do you need?",
  lily:     "Hi sweetie! I'm so glad you're talking to me. I may or may not have already figured out what you need — but go ahead, tell me everything.",
  marshall: "MARSHALL ERIKSEN, environmental lawyer and all-around great guy! This is going to be the best conversation. I can already feel it. What's up?",
};

let currentChar = 'barney';
let histories = { barney: [], ted: [], robin: [], lily: [], marshall: [] };
let initialized = { barney: true, ted: false, robin: false, lily: false, marshall: false };

// ── INITIALIZATION ──
window.addEventListener('DOMContentLoaded', () => {
  buildDropdownMenu();
  updateDropdownButton(currentChar);
  setupTheme(currentChar);
  addGreeting(currentChar);
  document.getElementById('user-input').focus();
});

// ── BUILD DROPDOWN MENU ──
function buildDropdownMenu() {
  const menu = document.getElementById('char-dropdown-menu');
  if (!menu) return;
  menu.innerHTML = '';
  
  Object.keys(CHARS).forEach(key => {
    const info = CHARS[key];
    const isActive = (key === currentChar);
    
    const item = document.createElement('button');
    item.className = `dropdown-item ${isActive ? 'active' : ''}`;
    item.setAttribute('onclick', `selectChar('${key}', event)`);
    item.innerHTML = `
      <div class="dropdown-avatar" style="background: ${info.gradient}">${info.initials}</div>
      <div class="dropdown-info">
        <div class="dropdown-name">${info.name}</div>
        <div class="dropdown-status">${info.status}</div>
      </div>
      <svg class="dropdown-check" viewBox="0 0 24 24">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </svg>
    `;
    menu.appendChild(item);
  });
}

function updateDropdownButton(char) {
  const info = CHARS[char];
  const btnAvatar = document.getElementById('dropdown-btn-avatar');
  const btnName = document.getElementById('dropdown-btn-name');
  const dropdownBtn = document.getElementById('char-dropdown-btn');
  
  if (btnAvatar) {
    btnAvatar.style.background = info.gradient;
    btnAvatar.textContent = info.initials;
  }
  if (btnName) {
    btnName.textContent = info.name.split(' ')[0];
  }
  if (dropdownBtn) {
    dropdownBtn.style.setProperty('--char-color', info.color);
    dropdownBtn.style.setProperty('--char-glow', info.glow);
  }
}

function toggleCharDropdown(event) {
  event.stopPropagation();
  const menu = document.getElementById('char-dropdown-menu');
  const btn = document.getElementById('char-dropdown-btn');
  if (!menu) return;
  
  const isShow = menu.classList.contains('show');
  
  if (isShow) {
    closeCharDropdown();
  } else {
    menu.style.display = 'flex';
    setTimeout(() => {
      menu.classList.add('show');
      if (btn) btn.classList.add('open');
    }, 10);
  }
}

function closeCharDropdown() {
  const menu = document.getElementById('char-dropdown-menu');
  const btn = document.getElementById('char-dropdown-btn');
  if (menu && menu.classList.contains('show')) {
    menu.classList.remove('show');
    if (btn) btn.classList.remove('open');
    setTimeout(() => {
      if (!menu.classList.contains('show')) {
        menu.style.display = 'none';
      }
    }, 200);
  }
}

function selectChar(char, event) {
  event.stopPropagation();
  closeCharDropdown();
  switchChar(char);
}

// Close dropdown on click outside
document.addEventListener('click', () => {
  closeCharDropdown();
});

// ── SWITCH THEMES ──
function setupTheme(char) {
  const info = CHARS[char];
  const root = document.documentElement;
  
  root.style.setProperty('--accent-color', info.color);
  root.style.setProperty('--accent-gradient', info.gradient);
  root.style.setProperty('--accent-glow', info.glow);
  root.style.setProperty('--accent-bg-glow', info.bgGlow1);
  root.style.setProperty('--accent-bg-glow-sec', info.bgGlow2);
}

function switchChar(char) {
  if (char === currentChar) return;
  currentChar = char;
  const info = CHARS[char];

  // Update selection trigger state
  updateDropdownButton(char);
  buildDropdownMenu();

  // Update Header UI
  const headerAvatar = document.getElementById('header-avatar');
  const headerName = document.getElementById('header-name');
  const headerStatus = document.getElementById('header-status');
  const userInput = document.getElementById('user-input');
  const typingAvatar = document.getElementById('typing-avatar');
  
  if (headerAvatar) {
    headerAvatar.style.background = info.gradient;
    headerAvatar.textContent = info.initials;
  }
  if (headerName) headerName.textContent = info.name;
  if (headerStatus) headerStatus.textContent = info.status;
  if (userInput) {
    userInput.placeholder = info.placeholder;
  }
  
  if (typingAvatar) {
    typingAvatar.style.background = info.gradient;
    typingAvatar.textContent = info.initials;
  }

  // Reload Chat History matching original logic
  const win = document.getElementById('chat-window');
  win.innerHTML = '';
  addGreeting(char);
  if (initialized[char]) restoreHistory(char);
  initialized[char] = true;
  
  setupTheme(char);
  document.getElementById('user-input').focus();
}

function addGreeting(char) {
  const info = CHARS[char];
  const win = document.getElementById('chat-window');
  const label = document.createElement('div');
  label.className = 'char-label';
  label.textContent = info.name.split(' ')[0];
  win.appendChild(label);
  const row = document.createElement('div');
  row.className = 'msg-row char';
  row.innerHTML = `<div class="msg-avatar" style="background:${info.gradient}">${info.initials}</div><div class="bubble">${GREETINGS[char]}</div>`;
  win.appendChild(row);
  win.scrollTop = win.scrollHeight;
}

function restoreHistory(char) {
  histories[char].forEach(msg => {
    if (msg.role === 'user') appendBubble('user', msg.content, char);
    else appendBubble('char', msg.content, char);
  });
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  appendBubble('user', msg, currentChar);
  histories[currentChar].push({ role: 'user', content: msg });
  setTyping(true);

  try {
    const res = await fetch(BACKEND + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: histories[currentChar], character: currentChar })
    });
    const data = await res.json();
    const reply = data.reply || "Something went wrong. Try again.";
    histories[currentChar].push({ role: 'assistant', content: reply });
    setTyping(false);
    appendBubble('char', reply, currentChar);
  } catch(e) {
    setTyping(false);
    appendBubble('char', "Server might be waking up — wait 30 seconds and try again.", currentChar);
  }
  btn.disabled = false;
}

function appendBubble(side, text, char) {
  const win = document.getElementById('chat-window');
  const info = CHARS[char];
  const row = document.createElement('div');
  if (side === 'user') {
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="bubble-wrapper">
        <span class="char-label">You</span>
        <div class="bubble">${text}</div>
      </div>
    `;
  } else {
    const label = document.createElement('div');
    label.className = 'char-label';
    label.textContent = info.name.split(' ')[0];
    win.appendChild(label);
    row.className = 'msg-row char';
    row.innerHTML = `<div class="msg-avatar" style="background:${info.gradient}">${info.initials}</div><div class="bubble">${text}</div>`;
  }
  win.appendChild(row);
  win.scrollTop = win.scrollHeight;
}

function setTyping(show) {
  document.getElementById('typing').style.display = show ? 'flex' : 'none';
  if (show) document.getElementById('chat-window').scrollTop = 99999;
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
