<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIMYM — The Gang</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #f0f0f0; height: 100vh; display: flex; overflow: hidden; }

    #sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #0f0f18;
      border-right: 1px solid #1e1e2e;
      display: flex;
      flex-direction: column;
      padding: 16px 0;
    }

    #sidebar h2 {
      font-size: 11px;
      font-weight: 600;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 16px 12px;
    }

    .char-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .char-btn:hover { background: #1a1a28; }
    .char-btn.active { background: #1a1a28; border-left-color: var(--char-color); }

    .char-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      background: var(--char-color);
      color: #fff;
    }

    .char-info { flex: 1; min-width: 0; }
    .char-name { font-size: 13px; font-weight: 500; color: #e0e0e0; }
    .char-role { font-size: 11px; color: #555; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread { width: 8px; height: 8px; border-radius: 50%; background: var(--char-color); flex-shrink: 0; display: none; }

    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    #chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #1e1e2e;
      background: #0f0f18;
      flex-shrink: 0;
    }

    #header-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; }
    #header-name { font-size: 15px; font-weight: 500; }
    #header-status { font-size: 12px; color: #555; margin-top: 1px; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B6D11; margin-left: auto; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

    .msg-row { display: flex; gap: 10px; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0; }

    .bubble { padding: 10px 14px; font-size: 14px; line-height: 1.6; max-width: 75%; border-radius: 4px 14px 14px 14px; background: #1e1e2e; color: #e0e0e0; }
    .bubble.user { background: #185FA5; border-radius: 14px 4px 14px 14px; color: #fff; }

    .char-label { font-size: 11px; color: #444; margin-bottom: 3px; padding-left: 38px; }

    #typing { display: none; align-items: center; gap: 10px; padding: 0 20px 8px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; display: inline-block; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    #input-area { padding: 12px 20px 16px; border-top: 1px solid #1e1e2e; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    #user-input { flex: 1; resize: none; font-size: 14px; padding: 10px 14px; border-radius: 10px; border: 1px solid #2a2a3a; background: #0f0f18; color: #f0f0f0; font-family: inherit; line-height: 1.5; outline: none; }
    #user-input:focus { border-color: #2a2a4a; }
    #user-input::placeholder { color: #444; }
    #send-btn { height: 64px; padding: 0 18px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; color: #fff; transition: opacity 0.15s; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #switch-notice {
      font-size: 12px;
      color: #444;
      text-align: center;
      padding: 6px;
      background: #0f0f18;
      border-radius: 20px;
      margin: 0 auto;
      display: none;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>The Gang</h2>
  <button class="char-btn active" data-char="barney" style="--char-color:#185FA5" onclick="switchChar('barney')">
    <div class="char-avatar" style="--char-color:#185FA5">BS</div>
    <div class="char-info">
      <div class="char-name">Barney</div>
      <div class="char-role">Legend. Lawyer.</div>
    </div>
    <div class="unread" id="unread-barney"></div>
  </button>
  <button class="char-btn" data-char="ted" style="--char-color:#8B4513" onclick="switchChar('ted')">
    <div class="char-avatar" style="background:#8B4513">TM</div>
    <div class="char-info">
      <div class="char-name">Ted</div>
      <div class="char-role">Architect. Romantic.</div>
    </div>
    <div class="unread" id="unread-ted"></div>
  </button>
  <button class="char-btn" data-char="robin" style="--char-color:#8B0000" onclick="switchChar('robin')">
    <div class="char-avatar" style="background:#8B0000">RS</div>
    <div class="char-info">
      <div class="char-name">Robin</div>
      <div class="char-role">Journalist. Canadian.</div>
    </div>
    <div class="unread" id="unread-robin"></div>
  </button>
  <button class="char-btn" data-char="lily" style="--char-color:#8B6914" onclick="switchChar('lily')">
    <div class="char-avatar" style="background:#8B6914">LA</div>
    <div class="char-info">
      <div class="char-name">Lily</div>
      <div class="char-role">Teacher. Mastermind.</div>
    </div>
    <div class="unread" id="unread-lily"></div>
  </button>
  <button class="char-btn" data-char="marshall" style="--char-color:#2E6B2E" onclick="switchChar('marshall')">
    <div class="char-avatar" style="background:#2E6B2E">ME</div>
    <div class="char-info">
      <div class="char-name">Marshall</div>
      <div class="char-role">Lawyer. Optimist.</div>
    </div>
    <div class="unread" id="unread-marshall"></div>
  </button>
</div>

<div id="main">
  <div id="chat-header">
    <div id="header-avatar" style="background:#185FA5">BS</div>
    <div>
      <div id="header-name">Barney Stinson</div>
      <div id="header-status">Suits. Schemes. Legendary.</div>
    </div>
    <div class="online-dot"></div>
  </div>

  <div id="chat-window">
    <div class="char-label">Barney</div>
    <div class="msg-row">
      <div class="msg-avatar" style="background:#185FA5">BS</div>
      <div class="bubble">Suit up. You've reached Barney Stinson — lawyer, legend, and the best wingman you'll ever have. Ask me anything. This is going to be legen — wait for it — dary!</div>
    </div>
  </div>

  <div id="typing">
    <div class="msg-avatar" id="typing-avatar" style="background:#185FA5">BS</div>
    <div style="background:#1e1e2e;padding:12px 16px;border-radius:4px 14px 14px 14px;">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="2" placeholder="Message Barney..."></textarea>
    <button id="send-btn" onclick="sendMessage()" style="background:#185FA5">Send</button>
  </div>
</div>

<script>
const BACKEND = 'https://barney-backend-dxhq.onrender.com';

const CHARS = {
  barney: { name: 'Barney Stinson', initials: 'BS', color: '#185FA5', status: 'Suits. Schemes. Legendary.', placeholder: 'Message Barney...' },
  ted:    { name: 'Ted Mosby',      initials: 'TM', color: '#8B4513', status: 'Architect. Hopeless romantic.', placeholder: 'Message Ted...' },
  robin:  { name: 'Robin Scherbatsky', initials: 'RS', color: '#8B0000', status: 'Journalist. Canadian.', placeholder: 'Message Robin...' },
  lily:   { name: 'Lily Aldrin',    initials: 'LA', color: '#8B6914', status: 'Teacher. Secret mastermind.', placeholder: 'Message Lily...' },
  marshall: { name: 'Marshall Eriksen', initials: 'ME', color: '#2E6B2E', status: 'Lawyer. True optimist.', placeholder: 'Message Marshall...' },
};

const GREETINGS = {
  barney: "Suit up. You've reached Barney Stinson — lawyer, legend, and the best wingman you'll ever have. Ask me anything. This is going to be legen — wait for it — dary!",
  ted: "Oh hey! Ted Mosby here — architect, professor, and someone who believes everything happens for a reason. What's on your mind? I promise I'll only tell one long story.",
  robin: "Robin Scherbatsky. I have about five minutes between segments, so make it count. What do you need?",
  lily: "Hi sweetie! I'm so glad you're talking to me. I may or may not have already figured out what you need — but go ahead, tell me everything.",
  marshall: "MARSHALL ERIKSEN, environmental lawyer and all-around great guy! This is going to be the best conversation. I can already feel it. What's up?",
};

let currentChar = 'barney';
let histories = { barney: [], ted: [], robin: [], lily: [], marshall: [] };
let chatWindows = { barney: null, ted: null, robin: null, lily: null, marshall: null };

function switchChar(char) {
  if (char === currentChar) return;
  currentChar = char;
  const info = CHARS[char];

  document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-char="${char}"]`).classList.add('active');
  document.getElementById('unread-' + char).style.display = 'none';

  document.getElementById('header-avatar').style.background = info.color;
  document.getElementById('header-avatar').textContent = info.initials;
  document.getElementById('header-name').textContent = info.name;
  document.getElementById('header-status').textContent = info.status;
  document.getElementById('send-btn').style.background = info.color;
  document.getElementById('user-input').placeholder = info.placeholder;
  document.getElementById('typing-avatar').style.background = info.color;
  document.getElementById('typing-avatar').textContent = info.initials;

  const win = document.getElementById('chat-window');
  win.innerHTML = '';

  if (!chatWindows[char]) {
    chatWindows[char] = true;
    addGreeting(char);
  } else {
    restoreHistory(char);
  }

  document.getElementById('user-input').focus();
}

function addGreeting(char) {
  const info = CHARS[char];
  const win = document.getElementById('chat-window');
  const label = document.createElement('div');
  label.className = 'char-label';
  label.textContent = info.name.split(' ')[0];
  win.appendChild(label);
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `<div class="msg-avatar" style="background:${info.color}">${info.initials}</div><div class="bubble">${GREETINGS[char]}</div>`;
  win.appendChild(row);
}

function restoreHistory(char) {
  const win = document.getElementById('chat-window');
  const info = CHARS[char];
  addGreeting(char);
  histories[char].forEach(msg => {
    if (msg.role === 'user') {
      appendBubble('user', msg.content, char);
    } else {
      appendBubble('barney-side', msg.content, char);
    }
  });
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  btn.disabled = true;

  appendBubble('user', msg, currentChar);
  histories[currentChar].push({ role: 'user', content: msg });
  setTyping(true);

  try {
    const res = await fetch(BACKEND + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: histories[currentChar], character: currentChar })
    });
    const data = await res.json();
    const reply = data.reply || "Something went wrong. Try again.";
    histories[currentChar].push({ role: 'assistant', content: reply });
    setTyping(false);
    appendBubble('barney-side', reply, currentChar);
  } catch(e) {
    setTyping(false);
    appendBubble('barney-side', "Server might be waking up — wait 30 seconds and try again.", currentChar);
  }
  btn.disabled = false;
}

function appendBubble(side, text, char) {
  const win = document.getElementById('chat-window');
  const info = CHARS[char];
  const row = document.createElement('div');

  if (side === 'user') {
    row.className = 'msg-row user';
    row.innerHTML = `<div class="bubble user">${text}</div>`;
  } else {
    const label = document.createElement('div');
    label.className = 'char-label';
    label.textContent = info.name.split(' ')[0];
    win.appendChild(label);
    row.className = 'msg-row';
    row.innerHTML = `<div class="msg-avatar" style="background:${info.color}">${info.initials}</div><div class="bubble">${text}</div>`;
  }
  win.appendChild(row);
  win.scrollTop = win.scrollHeight;
}

function setTyping(show) {
  document.getElementById('typing').style.display = show ? 'flex' : 'none';
  if (show) document.getElementById('chat-window').scrollTop = 99999;
}

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
